<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Magical night gradient background -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0812"/>
      <stop offset="20%" stop-color="#1a1228"/>
      <stop offset="55%" stop-color="#2a1a34"/>
      <stop offset="85%" stop-color="#1e1630"/>
      <stop offset="100%" stop-color="#12100c"/>
    </linearGradient>
    <!-- Aurora overlay -->
    <linearGradient id="auroraGrad" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0%" stop-color="#e8a537" stop-opacity="0"/>
      <stop offset="40%" stop-color="#e8a537" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#a878ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3dd8c5" stop-opacity="0"/>
    </linearGradient>
    <!-- Logo gradient -->
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0c06a"/>
      <stop offset="100%" stop-color="#c8882a"/>
    </linearGradient>
    <!-- Orb glow -->
    <radialGradient id="goldOrb">
      <stop offset="0%" stop-color="#ffecb4" stop-opacity="1"/>
      <stop offset="40%" stop-color="#e8a537" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#e8a537" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="purpleOrb">
      <stop offset="0%" stop-color="#dcb4ff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#a878ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a878ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tealOrb">
      <stop offset="0%" stop-color="#a5fff0" stop-opacity="1"/>
      <stop offset="40%" stop-color="#3dd8c5" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3dd8c5" stop-opacity="0"/>
    </radialGradient>
    <!-- Title glow filter -->
    <filter id="titleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#auroraGrad)" opacity="0.7"/>

  <!-- Distant stars -->
  <g fill="#fff" opacity="0.6">
    <circle cx="120" cy="80" r="1"/>
    <circle cx="280" cy="50" r="0.8"/>
    <circle cx="450" cy="95" r="1.2"/>
    <circle cx="640" cy="40" r="0.9"/>
    <circle cx="820" cy="85" r="1"/>
    <circle cx="980" cy="60" r="0.8"/>
    <circle cx="1100" cy="100" r="1.1"/>
    <circle cx="60" cy="180" r="0.7"/>
    <circle cx="1140" cy="220" r="0.9"/>
    <circle cx="180" cy="240" r="0.8"/>
    <circle cx="1050" cy="380" r="0.7"/>
    <circle cx="50" cy="420" r="0.9"/>
  </g>

  <!-- Floating magical orbs -->
  <circle cx="180" cy="180" r="55" fill="url(#goldOrb)"/>
  <circle cx="180" cy="180" r="6" fill="#ffecb4"/>

  <circle cx="1020" cy="220" r="70" fill="url(#purpleOrb)"/>
  <circle cx="1020" cy="220" r="7" fill="#dcb4ff"/>

  <circle cx="1080" cy="450" r="50" fill="url(#tealOrb)"/>
  <circle cx="1080" cy="450" r="5" fill="#a5fff0"/>

  <circle cx="120" cy="490" r="40" fill="url(#purpleOrb)"/>
  <circle cx="120" cy="490" r="4" fill="#dcb4ff"/>

  <!-- Decorative flourishes (corners) -->
  <g stroke="#e8a537" stroke-width="1.5" fill="none" opacity="0.55">
    <!-- Top-left -->
    <path d="M 60 60 L 60 110 M 60 60 L 110 60 M 60 60 Q 90 90 130 75 M 60 60 Q 90 90 75 130"/>
    <!-- Top-right -->
    <path d="M 1140 60 L 1140 110 M 1140 60 L 1090 60 M 1140 60 Q 1110 90 1070 75 M 1140 60 Q 1110 90 1125 130"/>
    <!-- Bottom-left -->
    <path d="M 60 570 L 60 520 M 60 570 L 110 570 M 60 570 Q 90 540 130 555 M 60 570 Q 90 540 75 500"/>
    <!-- Bottom-right -->
    <path d="M 1140 570 L 1140 520 M 1140 570 L 1090 570 M 1140 570 Q 1110 540 1070 555 M 1140 570 Q 1110 540 1125 500"/>
  </g>

  <!-- Logo + brand block -->
  <g transform="translate(600, 175)">
    <!-- Logo halo -->
    <circle cx="0" cy="0" r="55" fill="url(#goldOrb)" opacity="0.4"/>
    <!-- Logo square -->
    <rect x="-35" y="-35" width="70" height="70" rx="14" fill="url(#logoGrad)"/>
    <text x="0" y="13" text-anchor="middle" font-family="Georgia, serif" font-size="40" font-weight="900" fill="#12100c" letter-spacing="-2">C</text>
  </g>

  <!-- Eyebrow -->
  <text x="600" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#c9a5ff" letter-spacing="6" font-weight="600">
    ✦ ROYAUME HYTALE ✦
  </text>

  <!-- Main title -->
  <text x="600" y="365" text-anchor="middle" font-family="Georgia, serif" font-size="84" font-weight="900" fill="#f5f0e8" letter-spacing="3" filter="url(#titleGlow)">
    CielDeVignis
  </text>

  <!-- Tagline -->
  <text x="600" y="415" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="22" fill="#a89075" letter-spacing="0.5">
    « Le compagnon du serveur Hytale PvE »
  </text>

  <!-- Feature highlights -->
  <g font-family="Georgia, serif" font-size="16" letter-spacing="1.5" font-weight="600">
    <text x="320" y="490" text-anchor="middle" fill="#3dd8c5">⚒️ BUILD CREATOR</text>
    <text x="600" y="490" text-anchor="middle" fill="#e8a537">📖 WIKI &amp; DONJONS</text>
    <text x="880" y="490" text-anchor="middle" fill="#c9a5ff">🌍 COMMUNAUTÉ</text>
  </g>

  <!-- Footer URL -->
  <text x="600" y="565" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#6a5a45" letter-spacing="3" font-weight="600">
    CIELDEVIGNIS.VERCEL.APP
  </text>
</svg>
